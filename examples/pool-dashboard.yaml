title: BAZÉN - DASHBOARD
path: bazen
icon: mdi:pool-thermometer
type: custom:grid-layout
layout:
  grid-template-columns: 1fr 1fr 1fr 1fr
  grid-template-rows: auto
  grid-gap: 12px
cards:
  # --- 1. ALARMY A STÁŘÍ KALIBRACE (DYNAMICKÁ LIŠTA) ---
  - type: custom:mushroom-chips-card
    chips:
      - type: template
        entity: binary_sensor.phx2_poolmonitor_ph_alert
        icon: mdi:ph
        icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
        content: "pH: {{ 'PROBLÉM' if is_state(entity, 'on') else 'OK' }}"
      - type: template
        entity: binary_sensor.phx2_poolmonitor_orp_alert
        icon: mdi:waves
        icon_color: "{{ 'red' if is_state(entity, 'on') else 'green' }}"
        content: "ORP: {{ 'PROBLÉM' if is_state(entity, 'on') else 'OK' }}"
      - type: template
        entity: sensor.phx2_poolmonitor_ph_calibration_age
        icon: mdi:flask-check
        icon_color: >
          {% set days = states(entity) | int(0) %}
          {{ 'red' if days > 30 else 'orange' if days > 21 else 'green' }}
        content: "pH Kalib.: {{ states(entity) }} d"
      - type: template
        entity: sensor.phx2_poolmonitor_orp_calibration_age
        icon: mdi:flask-check
        icon_color: >
          {% set days = states(entity) | int(0) %}
          {{ 'red' if days > 30 else 'orange' if days > 21 else 'green' }}
        content: "ORP Kalib.: {{ states(entity) }} d"
      - type: template
        entity: binary_sensor.phx2_poolmonitor_pump_status
        icon: mdi:water-pump
        icon_color: "{{ 'blue' if is_state(entity, 'on') else 'grey' }}"
        content: "Průtok: {{ 'BĚŽÍ' if is_state(entity, 'on') else 'STOP' }}"
    view_layout:
      grid-column: 1 / span 4
    card_mod:
      style: |
        ha-card { --chip-height: 50px; font-weight: bold; border: none; background: transparent; }

  # --- 2. VAROVÁNÍ: TLAK FILTRACE (Zobrazí se pouze při 1.0 bar a více) ---
  - type: conditional
    conditions:
      - entity: sensor.phx2_poolmonitor_pressure_status
        state_not: "0.0"
      - entity: sensor.phx2_poolmonitor_pressure_status
        state_not: "unknown"
    card:
      type: custom:mushroom-template-card
      primary: "⚠️ NUTNÝ PRŮPLACH FILTRU!"
      secondary: "Tlak v potrubí dosáhl horní mez: {{ states('sensor.phx2_poolmonitor_pressure_status') }} bar"
      icon: mdi:alert-octagon
      icon_color: red
      layout: horizontal
      card_mod:
        style: |
          ha-card {
            {% if states('sensor.phx2_poolmonitor_pressure_status') | float(0) >= 1.0 %}
              background: rgba(255, 0, 0, 0.15);
              border: 1px solid red;
              animation: blink 2s infinite;
            {% else %}
              display: none;
            {% endif %}
          }
          @keyframes blink {
            50% { opacity: 0.7; }
          }
    view_layout:
      grid-column: 1 / span 4

  # --- 3. KVALITA VODY & KAMERA ---
  - type: vertical-stack
    view_layout:
      grid-column: 1 / span 2
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.phx2_poolmonitor_water_quality_score
        name: Celková kvalita vody
        icon: mdi:water-check
        icon_color: teal
        secondary_info: last-changed
      - type: custom:mini-graph-card
        entities:
          - entity: sensor.phx2_poolmonitor_water_quality_score
            name: Kvalita
            color: "#1D9E75"
        height: 100
        line_width: 4
        show:
          fill: fade
          extrema: true

  - type: picture-entity
    entity: camera.cam02_vga_bazen
    name: Živý náhled
    camera_view: live
    view_layout:
      grid-column: 3 / span 2
    card_mod:
      style: |
        ha-card { height: 215px !important; }

  # --- 4. CHEMIE & FYZIKA (TRENDY) ---
  - type: custom:mini-graph-card
    name: pH Trend (48h)
    entities:
      - entity: sensor.phx2_poolmonitor_ph_value
        name: pH
        color: "#ffb333"
      - entity: number.phx2_poolmonitor_ph_low_limit
        color: "#fad7a0"
        line_width: 1
      - entity: number.phx2_poolmonitor_ph_high_limit
        color: "#fad7a0"
        line_width: 1
    hours_to_show: 48
    view_layout:
      grid-column: 1 / span 2

  - type: custom:mini-graph-card
    name: ORP Trend (48h)
    entities:
      - entity: sensor.phx2_poolmonitor_orp_value
        name: Redox
        color: "#09cdf9"
      - entity: number.phx2_poolmonitor_orp_low_limit
        color: "#2980b9"
        line_width: 1
    hours_to_show: 48
    view_layout:
      grid-column: 3 / span 2

  - type: custom:mini-graph-card
    name: Teplota vody (48h)
    entities:
      - entity: sensor.apa_temp
        name: Voda
        color: "#D85A30"
    hours_to_show: 48
    view_layout:
      grid-column: 1 / span 2

  - type: custom:mini-graph-card
    name: Tlak v potrubí (24h)
    entities:
      - entity: sensor.phx2_poolmonitor_pressure_status
        name: Tlak
    color_thresholds:
      - value: 0
        color: "#7F77DD"
      - value: 0.8
        color: "#ffeb3b"
      - value: 1.0
        color: "#f44336"
    hours_to_show: 24
    line_width: 8
    show:
      graph: bar
      extrema: true
    view_layout:
      grid-column: 3 / span 2

  # --- 5. PROVOZNÍ AUDIT (FILTRACE) ---
  - type: vertical-stack
    view_layout:
      grid-column: 1 / span 2
    cards:
      - type: custom:mushroom-template-card
        primary: >
          {% set t = states('counter.pocitadlo_bazen_2h') | int %} 
          {{ (t // 60) }}h {{ (t % 60) }}min
        secondary: Dnešní reálný běh filtrace
        icon: mdi:timer-cog
        icon_color: blue
      - type: history-graph
        entities:
          - entity: schedule.filter_timer_workdays
          - entity: schedule.filter_timer_weekend
        title: Časový plán
        hours_to_show: 24

  - type: history-graph
    title: Využití čerpadla (24h)
    entities:
      - entity: switch.smr_bazen_pumpa
      - entity: binary_sensor.phx2_poolmonitor_pump_status
    hours_to_show: 24
    view_layout:
      grid-column: 3 / span 2

  # --- 6. OVLÁDÁNÍ TECHNOLOGIE ---
  - type: entities
    title: Ovládání technologie
    entities:
      - entity: switch.smr_bazen_pumpa
        name: Čerpadlo Manual
      - entity: input_select.filter_state_selector
        name: Režim filtrace
        icon: mdi:car-shift-pattern
      - entity: input_boolean.toggle_filtrace_manual
        name: Ruční vysávání
        icon: mdi:vacuum-outline
      - entity: switch.a6_relay3
        name: Osvětlení bazénu
        icon: mdi:car-parking-lights
    view_layout:
      grid-column: 1 / span 2

  # --- 7. KALIBRACE SOND ---
  - type: entities
    title: Kalibrace PHX
    icon: mdi:flask
    entities:
      - type: button
        name: Kalibrovat pH 4.0
        icon: mdi:test-tube
        tap_action:
          action: call-service
          service: button.press
          target: { entity_id: button.phx2_poolmonitor_calibrate_p_h_4_0 }
      - type: button
        name: Kalibrovat pH 7.0
        icon: mdi:test-tube
        tap_action:
          action: call-service
          service: button.press
          target: { entity_id: button.phx2_poolmonitor_calibrate_p_h_7_0 }
      - type: button
        name: Kalibrovat ORP 475 mV
        icon: mdi:test-tube
        tap_action:
          action: call-service
          service: button.press
          target: { entity_id: button.phx2_poolmonitor_calibrate_orp_475mv }
      - type: button
        name: Kalibrovat ORP 650 mV
        icon: mdi:test-tube
        tap_action:
          action: call-service
          service: button.press
          target: { entity_id: button.phx2_poolmonitor_calibrate_orp_650mv }
      - type: divider
      - entity: sensor.phx2_poolmonitor_calibration_status
        name: Stav kalibrace
        icon: mdi:information-outline
    view_layout:
      grid-column: 3 / span 2

  # --- 8. DIAGNOSTIKA SYSTÉMU ---
  - type: entities
    title: Diagnostika systému
    entities:
      - entity: sensor.phx2_poolmonitor_wifi_signal
        name: WiFi signál
      - entity: sensor.phx2_poolmonitor_uptime
        name: Uptime jednotky
      - type: button
        name: Reset kalibrace
        icon: mdi:restart
        tap_action:
          action: call-service
          service: button.press
          target: { entity_id: button.phx2_poolmonitor_reset_calibration }
    view_layout:
      grid-column: 1 / span 4